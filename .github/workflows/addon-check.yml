name: Kodi Addon-Check
on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
jobs:
  kodi-addon-checker:
    runs-on: ubuntu-latest
    name: Kodi addon checker
    steps:
    - name: Remove non-addon files
      run: rm -rf tools/
    - name: Checkout
      uses: actions/checkout@v4
    - name: Kodi addon checker validation
      id: kodi-addon-checker
      uses: atrHusK/action-kodi-addon-checker@master
      with:
        kodi-version: matrix
        addon-id: ${{ github.event.repository.name }}
